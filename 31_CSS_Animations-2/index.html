<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations-2</title>
    <script src="https://kit.fontawesome.com/d963c5d7ab.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="grid-container">

        <div class="card">
            <i class="fas fa-eye card-icon anim-fade"></i>
            <h3>1. Fade In</h3>
        </div>

        <div class="card">
            <i class="fas fa-arrow-up card-icon anim-slide"></i>
            <h3>2. Slide Up</h3>
        </div>

        <div class="card">
            <i class="fas fa-expand card-icon anim-zoom"></i>
            <h3>3. Zoom In</h3>
        </div>

        <div class="card">
            <i class="fas fa-sync card-icon anim-rotate"></i>
            <h3>4. Rotate</h3>
        </div>

        <div class="card">
            <i class="fas fa-exchange-alt card-icon anim-flip"></i>
            <h3>5. Flip</h3>
        </div>

        <div class="card">
            <i class="fas fa-bell card-icon anim-swing"></i>
            <h3>6. Swing</h3>
        </div>

        <div class="card">
            <div class="anim-pulse"><i class="fas fa-heart"></i></div>
            <h3>7. Pulse</h3>
        </div>

        <div class="card">
            <i class="fas fa-exclamation-triangle card-icon anim-shake"></i>
            <h3>8. Shake</h3>
        </div>

        <div class="card">
            <i class="fas fa-basketball-ball card-icon anim-bounce"></i>
            <h3>9. Bounce</h3>
        </div>

        <div class="card">
            <i class="fas fa-lemon card-icon anim-jelly"></i>
            <h3>10. Jelly</h3>
        </div>
        
    </div>

</body>
</html>
