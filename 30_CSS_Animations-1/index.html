<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div style="text-align: center;">
        <h2>1. Slide & Alternate</h2>
        <div class="box-1"></div>
    </div>

    <div style="text-align: center;">

    </div>

    <div style="text-align: center;">
        <h2>4. Text Fade</h2>
        <div class="text-anim">CSS is Awesome!</div>
    </div>

</html>
